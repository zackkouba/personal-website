# Use the official Node.js image to build the React app
image: node:latest

pages:
  stage: deploy
  script:
    # Install dependencies
    - npm install
    
    # Build the Vite project (compiles to the 'dist' folder)
    - npm run build
    
    # GitLab Pages requires a 'public' folder. 
    # Since Vite already copied your static assets (like resume.pdf) into 'dist',
    # we can safely delete the source 'public' folder and rename 'dist' to 'public'.
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      # Tell GitLab Pages to deploy the contents of this folder
      - public
  rules:
    # Only run this deployment pipeline when changes are pushed to the main branch
    - if: $CI_COMMIT_BRANCH == "main"